<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/assets/images/favicon.svg" type="image/x-icon" />
    <title>Iniciar Sesión | SIAV</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/lineicons.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <div id="preloader"><div class="spinner"></div></div>
    <section class="signin-section">
      <div class="container-fluid">
        <div class="row">
          <div class="col-xl-6 col-lg-6 text-center d-none d-lg-flex align-items-center justify-content-center signin-left-wrapper">
            <div class="signin-left-content">
              <img src="/assets/images/auth/signin-image.svg" alt="SIAV" class="img-fluid" />
              <h2 class="mt-20">SIAV</h2>
              <p>Sistema de Administración de Vacaciones</p>
            </div>
          </div>
          <div class="col-xl-6 col-lg-6 col-md-8 mx-auto signin-right-wrapper">
            <div class="signin-inner">
              <div class="signin-logo text-center mb-30">
                <img src="/assets/images/logo/logo.svg" alt="logo" />
              </div>
              <h3 class="text-center mb-5">Iniciar Sesión</h3>
              <p class="text-center mb-30">Ingrese sus credenciales para acceder al sistema.</p>
              <form action="/login" method="post">
                <div class="input-style-1 mb-20">
                  <label>Usuario</label>
                  <input type="text" name="username" placeholder="Ingrese su usuario" />
                </div>
                <div class="input-style-1 mb-20">
                  <label>Contraseña</label>
                  <input type="password" name="password" placeholder="Ingrese su contraseña" />
                </div>
                <div class="button-group d-flex justify-content-center flex-column flex-sm-row flex-wrap gap-20 pt-20">
                  <button type="submit" class="main-btn primary-btn btn-hover w-100">
                    <i class="lni lni-enter me-2"></i> Ingresar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
