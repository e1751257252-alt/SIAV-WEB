<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="shortcut icon" th:href="@{/assets/images/favicon.png}"
	type="image/png" />
<title layout:title-pattern="$CONTENT_TITLE | SIAV">SIAV</title>
<link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}" />
<link rel="stylesheet" th:href="@{/assets/css/lineicons.css}" />
<link rel="stylesheet"
	th:href="@{/assets/css/materialdesignicons.min.css}" />
<link rel="stylesheet" th:href="@{/assets/css/main.css}" />
</head>
<body>
	<div id="preloader">
		<div class="spinner"></div>
	</div>

	<aside class="sidebar-nav-wrapper">
		<div class="navbar-logo" style="text-align: center;">
			<a th:href="@{/index}"> <img
				th:src="@{/assets/images/logo/logo-siav.png}" alt="Logo SIAV"
				style="max-height: 55px; width: auto;" />
			</a>
		</div>
		<nav class="sidebar-nav">
			<ul>
				<li class="nav-item"><a th:href="@{/index}"> <span
						class="icon"><i class="lni lni-home"></i></span> <span
						class="text">Página Principal</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/rol}"> <span
						class="icon"><i class="lni lni-shield"></i></span> <span
						class="text">Roles</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/usuario}"> <span
						class="icon"><i class="lni lni-users"></i></span> <span
						class="text">Usuarios</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/estadoSolicitud}"> <span
						class="icon"><i class="lni lni-tag"></i></span> <span class="text">Estado
							Solicitud</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/solicitud}"> <span
						class="icon"><i class="lni lni-files"></i></span> <span
						class="text">Solicitudes</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/solicitud/miEquipo}"> <span
						class="icon"><i class="lni lni-checkmark-circle"></i></span> <span
						class="text">Mi Equipo</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/saldoVacaciones}"> <span
						class="icon"><i class="lni lni-calendar"></i></span> <span
						class="text">Saldo Vacaciones</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/movimientoSaldo}"> <span
						class="icon"><i class="lni lni-shuffle"></i></span> <span
						class="text">Movimiento Saldo</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/historialEstados}"> <span
						class="icon"><i class="lni lni-timer"></i></span> <span
						class="text">Historial Estados</span>
				</a></li>
				<li class="nav-item"><a th:href="@{/notificacion}"> <span
						class="icon"><i class="lni lni-alarm"></i></span> <span
						class="text">Notificaciones</span>
				</a></li>
			</ul>
		</nav>
	</aside>
	<div class="overlay"></div>

	<main class="main-wrapper">
		<header class="header">
			<div class="container-fluid">
				<div class="row">
					<div class="col-lg-5 col-md-5 col-6">
						<div class="header-left d-flex align-items-center">
							<div class="menu-toggle-btn mr-15">
								<button id="menu-toggle" class="main-btn primary-btn btn-hover">
									<i class="lni lni-chevron-left me-2"></i> Menu
								</button>
							</div>
						</div>
					</div>
					<div class="col-lg-7 col-md-7 col-6">
						<div class="header-right">
							<div class="profile-box ml-15">
								<button class="dropdown-toggle bg-transparent border-0"
									type="button" id="profile" data-bs-toggle="dropdown"
									aria-expanded="false">
									<div class="profile-info">
										<div class="info">
											<div class="image">
												<img th:src="@{/assets/images/profile/profile-image.png}"
													alt="" />
											</div>
											<div>
												<h6 class="fw-500">Administrador</h6>
												<p>Admin</p>
											</div>
										</div>
									</div>
								</button>
								<ul class="dropdown-menu dropdown-menu-end"
									aria-labelledby="profile">
									<li><a th:href="@{/login}"><i class="lni lni-exit"></i>
											Cerrar Sesión</a></li>
								</ul>
							</div>
						</div>
					</div>
				</div>
			</div>
		</header>

		<section class="section">
			<div class="container-fluid">

				<!-- ============ CONTENIDO VARIABLE (rellenado por cada vista) ============ -->
				<div layout:fragment="cargarpaginas"></div>
				<!-- ============ FIN CONTENIDO VARIABLE ============ -->

			</div>
		</section>

		<footer class="footer">
			<div class="container-fluid">
				<div class="row">
					<div class="col-md-6 order-last order-md-first">
						<div class="copyright text-center text-md-start">
							<p class="text-sm">SIAV &mdash; Sistema de Administración de
								Vacaciones &copy; 2026</p>
						</div>
					</div>
				</div>
			</div>
		</footer>
	</main>
	<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/js/main.js}"></script>
</body>
</html>
