<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<title>Editar Saldo Vacaciones</title>
</head>
<body>
	<div layout:fragment="cargarpaginas">

		<div class="title-wrapper pt-30">
			<div class="row align-items-center">
				<div class="col-md-6">
					<div class="title">
						<h2>Editar Saldo Vacaciones</h2>
					</div>
				</div>
				<div class="col-md-6">
					<div class="breadcrumb-wrapper">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb">
								<li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
								<li class="breadcrumb-item"><a
									th:href="@{/saldoVacaciones}">Saldo Vacaciones</a></li>
								<li class="breadcrumb-item active" aria-current="page">Editar</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<div class="card-style mb-30">
			<form th:action="@{/saldoVacaciones/guardar}" th:object="${saldo}"
				method="post">
				<input type="hidden" th:field="*{idSaldo}">
				<div class="mb-3">
					<label for="idUsuario">Usuario</label>
					<select th:field="*{idUsuario}" class="form-control" id="idUsuario">
						<option value="">Seleccione un usuario</option>
						<option th:each="usuario : ${listausuarios}"
							th:value="${usuario.idUsuario}"
							th:text="${usuario.nombres} + ' ' + ${usuario.apellidos}"></option>
					</select>
				</div>
				<div class="mb-3">
					<label for="anio">Año</label> <input type="number"
						th:field="*{anio}" class="form-control" id="anio">
				</div>
				<div class="mb-3">
					<label for="diasAsignados">Días Asignados</label> <input
						type="number" step="0.01" th:field="*{diasAsignados}"
						class="form-control" id="diasAsignados">
				</div>
				<div class="mb-3">
					<label for="diasDisponibles">Días Disponibles</label> <input
						type="number" step="0.01" th:field="*{diasDisponibles}"
						class="form-control" id="diasDisponibles">
				</div>
				<button type="submit" class="main-btn primary-btn btn-hover">
					<i class="lni lni-save me-1"></i> Guardar
				</button>
			</form>
		</div>

	</div>
</body>
</html>
