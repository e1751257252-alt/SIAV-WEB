<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<title>Crear Solicitud</title>
</head>
<body>
	<div layout:fragment="cargarpaginas">

		<div class="title-wrapper pt-30">
			<div class="row align-items-center">
				<div class="col-md-6">
					<div class="title">
						<h2>Crear Solicitud</h2>
					</div>
				</div>
				<div class="col-md-6">
					<div class="breadcrumb-wrapper">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb">
								<li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
								<li class="breadcrumb-item"><a th:href="@{/solicitud}">Solicitudes</a></li>
								<li class="breadcrumb-item active" aria-current="page">Crear</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<div class="card-style mb-30">
			<p>
				Jefe que aprobará esta solicitud: <strong
					th:text="${nombreJefe} ?: 'no tienes un jefe asignado, consulta con el administrador'"></strong>
			</p>
			<form th:action="@{/solicitud/guardar}" th:object="${solicitud}"
				method="post">
				<div class="mb-3">
					<label for="fechaInicio">Fecha Inicio</label> <input type="date"
						th:field="*{fechaInicio}" class="form-control" id="fechaInicio">
				</div>
				<div class="mb-3">
					<label for="fechaFin">Fecha Fin</label> <input type="date"
						th:field="*{fechaFin}" class="form-control" id="fechaFin">
				</div>
				<div class="mb-3">
					<label for="diasSolicitados">Días Solicitados</label> <input
						type="number" th:field="*{diasSolicitados}" class="form-control"
						id="diasSolicitados" readonly>
				</div>
				<div class="mb-3">
					<label for="motivo">Motivo</label> <input type="text"
						th:field="*{motivo}" class="form-control" id="motivo">
				</div>
				<button type="submit" class="main-btn primary-btn btn-hover">
					<i class="lni lni-save me-1"></i> Guardar
				</button>
			</form>
		</div>

		<script>
			function calcularDias() {
				var inicio = document.getElementById('fechaInicio').value;
				var fin = document.getElementById('fechaFin').value;
				if (!inicio || !fin) {
					return;
				}
				var msPorDia = 24 * 60 * 60 * 1000;
				var dias = Math.round((new Date(fin) - new Date(inicio)) / msPorDia) + 1;
				document.getElementById('diasSolicitados').value = dias > 0 ? dias : 0;
			}
			document.getElementById('fechaInicio').addEventListener('change', calcularDias);
			document.getElementById('fechaFin').addEventListener('change', calcularDias);
		</script>

	</div>
</body>
</html>
