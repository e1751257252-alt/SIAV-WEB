<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<title>Crear Solicitud</title>
</head>
<body>
	<div layout:fragment="cargarpaginas">

		<div class="title-wrapper pt-30">
			<div class="row align-items-center">
				<div class="col-md-6">
					<div class="title">
						<h2>Crear Solicitud</h2>
					</div>
				</div>
				<div class="col-md-6">
					<div class="breadcrumb-wrapper">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb">
								<li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
								<li class="breadcrumb-item"><a th:href="@{/solicitud}">Solicitudes</a></li>
								<li class="breadcrumb-item active" aria-current="page">Crear</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<div class="card-style mb-30">
			<form th:action="@{/solicitud/guardar}" th:object="${solicitud}"
				method="post">
				<div class="mb-3">
					<label for="idUsuario">ID Usuario</label> <input type="number"
						th:field="*{idUsuario}" class="form-control" id="idUsuario">
				</div>
				<div class="mb-3">
					<label for="fechaInicio">Fecha Inicio</label> <input type="date"
						th:field="*{fechaInicio}" class="form-control" id="fechaInicio">
				</div>
				<div class="mb-3">
					<label for="fechaFin">Fecha Fin</label> <input type="date"
						th:field="*{fechaFin}" class="form-control" id="fechaFin">
				</div>
				<div class="mb-3">
					<label for="diasSolicitados">Días Solicitados</label> <input
						type="number" th:field="*{diasSolicitados}" class="form-control"
						id="diasSolicitados">
				</div>
				<div class="mb-3">
					<label for="motivo">Motivo</label> <input type="text"
						th:field="*{motivo}" class="form-control" id="motivo">
				</div>
				<div class="mb-3">
					<label for="idEstado">ID Estado</label> <input type="number"
						th:field="*{idEstado}" class="form-control" id="idEstado">
				</div>
				<div class="mb-3">
					<label for="idAprobador">ID Aprobador</label> <input type="number"
						th:field="*{idAprobador}" class="form-control" id="idAprobador">
				</div>
				<div class="mb-3">
					<label for="observacionesAprobador">Observaciones</label> <input
						type="text" th:field="*{observacionesAprobador}"
						class="form-control" id="observacionesAprobador">
				</div>
				<button type="submit" class="main-btn primary-btn btn-hover">
					<i class="lni lni-save me-1"></i> Guardar
				</button>
			</form>
		</div>

	</div>
</body>
</html>
