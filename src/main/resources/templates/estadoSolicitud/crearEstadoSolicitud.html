<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<title>Crear Estado Solicitud</title>
</head>
<body>
	<div layout:fragment="cargarpaginas">

		<div class="title-wrapper pt-30">
			<div class="row align-items-center">
				<div class="col-md-6">
					<div class="title">
						<h2>Crear Estado Solicitud</h2>
					</div>
				</div>
				<div class="col-md-6">
					<div class="breadcrumb-wrapper">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb">
								<li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
								<li class="breadcrumb-item"><a
									th:href="@{/estadoSolicitud}">Estado Solicitud</a></li>
								<li class="breadcrumb-item active" aria-current="page">Crear</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<div class="card-style mb-30">
			<form th:action="@{/estadoSolicitud/guardar}" th:object="${estado}"
				method="post">
				<div class="mb-3">
					<label for="nombre">Nombre</label> <input type="text"
						th:field="*{nombre}" class="form-control" id="nombre">
				</div>
				<button type="submit" class="main-btn primary-btn btn-hover">
					<i class="lni lni-save me-1"></i> Guardar
				</button>
			</form>
		</div>

	</div>
</body>
</html>
