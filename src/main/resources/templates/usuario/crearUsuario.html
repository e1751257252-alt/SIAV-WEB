<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<title>Crear Usuario</title>
</head>
<body>
	<div layout:fragment="cargarpaginas">

		<div class="title-wrapper pt-30">
			<div class="row align-items-center">
				<div class="col-md-6">
					<div class="title">
						<h2>Crear Usuario</h2>
					</div>
				</div>
				<div class="col-md-6">
					<div class="breadcrumb-wrapper">
						<nav aria-label="breadcrumb">
							<ol class="breadcrumb">
								<li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
								<li class="breadcrumb-item"><a th:href="@{/usuario}">Usuarios</a></li>
								<li class="breadcrumb-item active" aria-current="page">Crear</li>
							</ol>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<div class="card-style mb-30">
			<form th:action="@{/usuario/guardar}" th:object="${usuario}"
				method="post">
				<div class="mb-3">
					<label for="cedula">Cédula</label> <input type="text"
						th:field="*{cedula}" class="form-control" id="cedula">
				</div>
				<div class="mb-3">
					<label for="nombres">Nombres</label> <input type="text"
						th:field="*{nombres}" class="form-control" id="nombres">
				</div>
				<div class="mb-3">
					<label for="apellidos">Apellidos</label> <input type="text"
						th:field="*{apellidos}" class="form-control" id="apellidos">
				</div>
				<div class="mb-3">
					<label for="email">Email</label> <input type="email"
						th:field="*{email}" class="form-control" id="email">
				</div>
				<div class="mb-3">
					<label for="passwordHash">Contraseña</label> <input type="password"
						th:field="*{passwordHash}" class="form-control" id="passwordHash">
				</div>
				<div class="mb-3">
					<label for="idRol">ID Rol</label> <input type="number"
						th:field="*{idRol}" class="form-control" id="idRol">
				</div>
				<div class="mb-3">
					<label for="idJefe">ID Jefe</label> <input type="number"
						th:field="*{idJefe}" class="form-control" id="idJefe">
				</div>
				<div class="mb-3">
					<label for="cargo">Cargo</label> <input type="text"
						th:field="*{cargo}" class="form-control" id="cargo">
				</div>
				<div class="mb-3">
					<label for="fechaIngreso">Fecha de Ingreso</label> <input
						type="date" th:field="*{fechaIngreso}" class="form-control"
						id="fechaIngreso">
				</div>
				<div class="mb-3 form-check">
					<input type="checkbox" class="form-check-input" id="activo"
						th:field="*{activo}"> <label class="form-check-label"
						for="activo">Activo</label>
				</div>
				<button type="submit" class="main-btn primary-btn btn-hover">
					<i class="lni lni-save me-1"></i> Guardar
				</button>
			</form>
		</div>

	</div>
</body>
</html>
